name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename and checksum APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/pi-mobile-${{ github.ref_name }}.apk
          cd artifacts
          sha256sum pi-mobile-${{ github.ref_name }}.apk > pi-mobile-${{ github.ref_name }}.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-mobile-apk
          path: artifacts/*
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: android
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: pi-mobile-apk
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: ${{ github.event.inputs.prerelease == 'true' || startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-') }}
          generate_release_notes: true
